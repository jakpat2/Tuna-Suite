<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <title>Widget | by jakpat</title>
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-dark: rgb(31, 31, 31);
            --text-main: #ffffff;
            --base-scale: 1.1; 
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: #00000000; 
            overflow: hidden;
            color: var(--text-main);
            height: 100vh; width: 100vw;
            font-size: calc(24px * var(--base-scale)); 
        }

        .widget {
            display: flex; align-items: center;
            background: var(--bg-dark);
            border-radius: 1.5em;
            padding: 1.2em;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        #cover {
    width: 4.5em; height: 4.5em;
    border-radius: 0.8em;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    transition: background-image 0.5s ease;
    position: relative; 
}

#pause-icon {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 0.54em;
    align-items: center; 
    justify-content: center;
    font-size: 1.5em; 
    color: white;
}

/* This targets the icon specifically when the body has the class */
body.is-paused #cover #pause-icon { display: flex; }

        .widget-info { margin-left: 1.2em; flex-grow: 1; overflow: hidden; }

        #widget-title {
            font-size: 0.9em; font-weight: 800; color: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #widget-artist {
            font-size: 0.7em; color: rgba(255,255,255,0.5);
            margin-bottom: 0.5em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .time-info {
            display: flex; justify-content: space-between;
            font-size: 0.5em; font-weight: 600;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.3em;
        }

        .progress-bar {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%; width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.3s linear;
        }
    </style>
</head>
<body>

        <div class="widget">
          <div id="cover">
            <div id="pause-icon">⏸</div>
          </div>
            <div class="widget-info">
                <div id="widget-title">No Song</div>
                <div id="widget-artist">Waiting...</div>
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>

    <script>
        const FETCH_URL = 'http://localhost:1608/';
        const OFFSET = 1.3;

        let current_song_pos = 0;
        let current_duration = 0;
        let current_title = "";
        let current_artist = "";
        let current_status = "";
        let last_tick_time = Date.now();
        let playback_rate = 1.0;

        function formatTime(s) {
            if (isNaN(s) || s < 0) return "0:00";
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateThemeColor(imgUrl) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = imgUrl + "?v=" + Date.now(); 
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const data = ctx.getImageData(0, 0, 10, 10).data;
                let r=0, g=0, b=0;
                for(let i=0; i<data.length; i+=4) { r += data[i]; g += data[i+1]; b += data[i+2]; }
                r = Math.floor(r/25); g = Math.floor(g/25); b = Math.floor(b/25);
                
                const brightness = (r*299 + g*587 + b*114) / 1000;
                if (brightness < 100) { r+=60; g+=60; b+=60; }
                if (brightness > 220) { r-=50; g-=50; b-=50; }

                document.documentElement.style.setProperty('--accent-color', `rgb(${r},${g},${b})`);
            };
        }

        function forceUpdateCover(url, attempts = 0) {
    setTimeout(() => {
        const img = new Image();
        const timestampedUrl = url + (url.includes('?') ? '&' : '?') + "t=" + Date.now();

        img.onload = () => {
            const cssUrl = `url("${timestampedUrl}")`;

            document.getElementById('cover').style.backgroundImage = cssUrl;
            
            updateThemeColor(url);

            if (attempts < 3) {
                setTimeout(() => forceUpdateCover(url, attempts + 1), 2000);
            }
        };

        img.onerror = () => {
            if (attempts < 5) {
                setTimeout(() => forceUpdateCover(url, attempts + 1), 1000);
            }
        };

        img.src = timestampedUrl;
    }, 500); 
}

        function fetch_data() {
            fetch(FETCH_URL).then(r => r.json()).then(data => {
                if (data.status === "paused") {
            document.body.classList.add('is-paused');
        } else {
            document.body.classList.remove('is-paused');
        }
                if (!data || data.status === "stopped") return;
                
                current_status = data.status;
                current_duration = data.duration / 1000;
                let server_pos = (data.progress / 1000) + OFFSET;
                let server_artists = (data.artists || ["Unknown"]).join(", ");
                let server_key = data.title + "|" + server_artists;
                let current_key = current_title + "|" + current_artist;

                if (server_key !== current_key) {
                    current_title = data.title;
                    current_artist = server_artists;
                    document.getElementById('widget-title').textContent = data.title;
                    document.getElementById('widget-artist').textContent = current_artist;
                    document.getElementById('time-total').textContent = formatTime(current_duration);
                    current_song_pos = server_pos; 
                    forceUpdateCover(data.cover_url);
                }

                document.getElementById('progress-fill').style.width = (data.progress/data.duration*100) + "%";
                const drift = server_pos - current_song_pos;
                playback_rate = Math.abs(drift) > 1.2 ? 1.0 : 1.0 + (drift * 0.2);
                if (Math.abs(drift) > 2.5) current_song_pos = server_pos; 
            }).catch(() => {});
        }

        setInterval(fetch_data, 1000);

        function update_loop() {
            const now = Date.now();
            const dt = (now - last_tick_time) / 1000;
            last_tick_time = now;

            if (current_status === "playing") {
                current_song_pos += (dt * playback_rate);
                document.getElementById('time-current').textContent = formatTime(current_song_pos - OFFSET);
            }
            requestAnimationFrame(update_loop);
        }
        requestAnimationFrame(update_loop);
    </script>
</body>
</html>
