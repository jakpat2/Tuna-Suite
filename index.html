<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <title>Tuna lyrics | Made by jakpat</title>
    <style>
        :root {
            --bg-color: transparent;
            --text-main: #ffffff;
            --scroll-speed: 0.6s;
            --word-speed: 0.3s; 
            --micro-lift: -2px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color); 
            overflow: hidden;
            color: var(--text-main);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center;
            /* Creates the fade-out effect at top and bottom */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        #lyrics-wrapper {
            width: 95%; 
            transition: transform var(--scroll-speed) cubic-bezier(0.23, 1, 0.32, 1);
        }

        #lyrics {
            list-style: none;
            padding: 0; margin: 0;
            text-align: center;
        }
        
        li {
            padding: 30px 10px; 
            font-size: 3.2rem; 
            line-height: 1.5;
            transition: opacity 0.5s ease;
            opacity: 0.15; 
            font-weight: 700;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
        }

        li.active { opacity: 1 !important; }

        .word-wrapper { display: inline-block; perspective: 1000px; }

        .word {
            display: inline-block;
            transition: transform var(--word-speed) cubic-bezier(0.4, 0, 0.2, 1), 
                        opacity var(--word-speed) ease,
                        text-shadow var(--word-speed) ease;
            opacity: 0.4;
            white-space: pre;
            transform: translateY(0);
        }

        .active-word {
            opacity: 1 !important;
            color: #ffffff !important;
            transform: translateY(var(--micro-lift)); 
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 0.6), 
                0 0 25px rgba(255, 255, 255, 0.2),
                0 5px 15px rgba(0, 0, 0, 0.8); 
        }

        .status-msg {
            opacity: 1 !important;
            font-size: 1.8rem !important; 
            margin-top: 45vh; 
            color: rgba(255,255,255,0.6);
            text-shadow: 0 0 10px black;
        }
    </style>

    <script>
        const FETCH_URL = 'http://localhost:1608/';
        const LYRCIS_HOST = "https://lrclib.net/api"; 
        // Get offset from URL (e.g., .../index.html?offset=2.5) or default to 1.3
const urlParams = new URLSearchParams(window.location.search);
const OFFSET = parseFloat(urlParams.get('offset')) || 1.3;

        let current_lyrics = [];
        let current_line_index = -1;
        let current_song_pos = 0;
        let current_title = "";
        let current_status = "";
        let last_tick_time = Date.now();
        let playback_rate = 1.0;

        function setStatus(msg) { 
            document.getElementById('lyrics-wrapper').style.transform = `translateY(0px)`;
            document.getElementById("lyrics").innerHTML = `<li class='status-msg'>${msg}</li>`; 
        }

        async function getLyrics(title, artists, duration) {
            setStatus("Searching...");
            
            // Clean common junk out of YouTube titles
            const cleanTitle = title.replace(/\(feat.*?\)|\[.*?\]|\(Official.*?\)|- Remastered.*|- Deluxe.*/gi, "").split('-')[0].trim();
            const cleanArtist = artists[0].replace(/- Topic/gi, "").trim();

            // Strategy List:
            // 1. Get with duration (High accuracy for synced lyrics)
            // 2. Get with just metadata
            // 3. Broad search (Last resort)
            const endpoints = [
                `${LYRCIS_HOST}/get?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(cleanArtist)}${duration ? `&duration=${Math.round(duration)}` : ''}`,
                `${LYRCIS_HOST}/get?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(cleanArtist)}`,
                `${LYRCIS_HOST}/search?q=${encodeURIComponent(cleanArtist + " " + cleanTitle)}`
            ];

            for (const url of endpoints) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    
                    const data = await response.json();
                    const result = Array.isArray(data) ? data.find(i => i.syncedLyrics) : data;

                    if (result && result.syncedLyrics) {
                        renderLyrics(result.syncedLyrics);
                        return; // Match found!
                    }
                } catch (e) {
                    console.warn("Search attempt failed, trying next...");
                }
            }
            
            current_lyrics = []; 
            setStatus("Lyrics Not Found"); 
        }

        function renderLyrics(syncedText) {
            const lines = syncedText.split("\n");
            current_lyrics = [];
            const timeRegex = /\[(\d+):(\d+)(?:[.:](\d+))?\]/;
            
            for (let line of lines) {
                const match = line.match(timeRegex);
                if (match) {
                    const mins = parseInt(match[1]);
                    const secs = parseInt(match[2]);
                    const msStr = match[3] || "0";
                    const ms = parseInt(msStr.padEnd(3, '0').substring(0, 3));
                    const totalSeconds = mins * 60 + secs + (ms / 1000);
                    
                    const content = line.replace(/\[.*?\]/, "").trim();
                    if (!content) continue; 
                    
                    const words = content.split(/\s+/).map(w => ({ text: w }));
                    current_lyrics.push({ time: totalSeconds, words });
                }
            }
            
            current_lyrics.sort((a, b) => a.time - b.time);
            const lyricsEl = document.getElementById("lyrics");
            lyricsEl.innerHTML = "";
            
            current_lyrics.forEach((line, i) => {
                const li = document.createElement('li');
                li.id = `line-${i}`;
                line.words.forEach(w => {
                    const wrapper = document.createElement('span');
                    wrapper.className = 'word-wrapper';
                    const span = document.createElement('span');
                    span.className = 'word';
                    span.textContent = w.text + " ";
                    wrapper.appendChild(span);
                    li.appendChild(wrapper);
                });
                lyricsEl.appendChild(li);
            });
        }

        function fetch_data() {
            fetch(FETCH_URL).then(r => r.json()).then(data => {
                if (!data || data.status === "stopped") {
                    if (current_title !== "") { 
                        current_title = ""; 
                        current_lyrics = []; 
                        setStatus("Waiting for music..."); 
                    }
                    return;
                }
                
                let server_pos = (data.progress / 1000) + OFFSET;
                current_status = data.status;
                
                if (data.title !== current_title) {
                    current_title = data.title;
                    current_line_index = -1;
                    current_lyrics = [];
                    current_song_pos = server_pos; 
                    
                    // Pulling duration from Tuna (in ms, so we convert to seconds)
                    const durationInSeconds = data.duration ? data.duration / 1000 : null;
                    getLyrics(current_title, data.artists || ["Unknown"], durationInSeconds);
                }
                
                // Drift correction
                const drift = server_pos - current_song_pos;
                playback_rate = Math.abs(drift) > 1.2 ? 1.0 : 1.0 + (drift * 0.2);
                if (Math.abs(drift) > 2.5) current_song_pos = server_pos; 
            }).catch(() => {});
        }

        setInterval(fetch_data, 1000);

        function update_loop() {
            const now = Date.now();
            const dt = (now - last_tick_time) / 1000;
            last_tick_time = now;

            if (current_status === "playing" && current_lyrics.length > 0) {
                current_song_pos += (dt * playback_rate);
                
                let targetIndex = -1;
                for (let i = 0; i < current_lyrics.length; i++) {
                    if (current_song_pos >= current_lyrics[i].time) targetIndex = i;
                    else break;
                }

                if (targetIndex !== -1) {
                    if (targetIndex !== current_line_index) {
                        const line = document.getElementById("line-" + targetIndex);
                        const prev = document.getElementById("line-" + current_line_index);
                        if (prev) { 
                            prev.classList.remove("active"); 
                            prev.querySelectorAll('.word').forEach(w => w.classList.remove('active-word')); 
                        }
                        if (line) {
                            line.classList.add("active");
                            const offset = (window.innerHeight / 2) - (line.offsetTop + line.offsetHeight / 2);
                            document.getElementById('lyrics-wrapper').style.transform = `translateY(${offset}px)`;
                        }
                        current_line_index = targetIndex;
                    }

                    // Word-by-word highlighting logic
                    const lineData = current_lyrics[targetIndex];
const nextLine = current_lyrics[targetIndex + 1];
const lineStart = lineData.time;
const lineEnd = nextLine ? nextLine.time : lineStart + 4;

// 1. Determine the "Stretched" duration vs the "Natural" duration
const rawLineDuration = Math.max(0.1, lineEnd - lineStart);
const timeInLine = current_song_pos - lineStart;

// 2. The "Speed Limit": Prevent a line from taking more than ~0.6s per word.
// This is what stops the instrumental stretching.
const naturalDuration = (lineData.words.length * 0.6) + 1.2;
const activeSingingDuration = Math.min(rawLineDuration, naturalDuration);

// 3. Keep existing punctuation and density logic
const totalChars = lineData.words.join('').length;
const isHighDensity = (totalChars / activeSingingDuration) > 12; 

let totalWeight = 0;
const weights = lineData.words.map(w => {
    let weight = Math.max(2, w.text.length); 
    if (w.text.match(/[.,!?]$/) && !isHighDensity) weight += 4; 
    totalWeight += weight;
    return weight;
});

// 4. Word-by-word highlighting with a "Cut-off"
let activeWordIdx = -1; // Set to -1 so highlights turn OFF after naturalDuration

if (timeInLine <= activeSingingDuration) {
    let cumulativeTime = 0;
    for (let j = 0; j < lineData.words.length; j++) {
        const wordDuration = (weights[j] / totalWeight) * activeSingingDuration;
        if (timeInLine >= cumulativeTime && timeInLine < cumulativeTime + wordDuration) {
            activeWordIdx = j;
            break;
        }
        cumulativeTime += wordDuration;
    }
}

// 5. Update the DOM
const wordSpans = document.querySelectorAll(`#line-${targetIndex} .word`);
wordSpans.forEach((w, i) => {
    w.classList.toggle('active-word', i === activeWordIdx);
});
                }
            }
            requestAnimationFrame(update_loop);
        }
        requestAnimationFrame(update_loop);
    </script>
</head>
<body>
    <div id="lyrics-wrapper">
        <ul id="lyrics">
            <li class="status-msg">Waiting for music...</li>
        </ul>
    </div>
</body>
</html>
